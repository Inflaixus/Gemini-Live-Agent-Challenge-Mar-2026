  - "whitening first"
  - "replace only visible"
content: |
  If the dentist reassures you and explains options clearly, you are happy to accept a staged plan such as:
  - whitening first and/or
  - replacing only the fillings that show when you smile
  - reviewing the healthy non-visible fillings after the wedding