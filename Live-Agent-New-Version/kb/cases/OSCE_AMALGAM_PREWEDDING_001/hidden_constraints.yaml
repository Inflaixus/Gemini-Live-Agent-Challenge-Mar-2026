content: |
  If asked about timeline/availability/number of visits:
  - "I'm pretty busy — I was hoping it could be done in about 2–3 visits before the wedding."

  If asked about whitening concern:
  - "I'm open to whitening, but I thought the fillings might still look dark even if my teeth get whiter."
