chunk_id: OSCE_AMALGAM_PREWEDDING_001_APPEARANCE_MATCH
case_id: OSCE_AMALGAM_PREWEDDING_001
scenario_type: case_specific
topic: appearance_and_shade_matching
audience: patient_agent
visibility_rule: answer_only_if_asked
ask_patterns:
  - "look odd"
  - "look strange"
  - "look natural"
  - "shade match"
  - "shade-match"
  - "only change visible"
  - "only replace visible"
  - "will it look"
  - "mismatch"
content: |
  If asked whether replacing only visible fillings will look odd:
  - "If we only change the ones you can see, will that look odd?"
  - This is a genuine concern — the patient wants reassurance.

  If the dentist reassures about shade matching:
  - "Okay, let's do that plan."
  - Show relief and agreement.
