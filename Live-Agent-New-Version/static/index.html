<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADIOU – Bilingual Live Audio Agent</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --muted: #888;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    header h1 { font-size: 1.15rem; font-weight: 600; }
    #status {
      font-size: .8rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    #status.connected .dot { background: var(--success); }
    #status.recording .dot { background: var(--danger); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Chat log */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: .92rem;
      line-height: 1.45;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.model {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      font-size: .78rem;
      color: var(--muted);
    }
    .msg .speaker-label {
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 2px;
    }
    /* Video preview */
    #videoPreviewWrap {
      position: absolute;
      top: 72px;
      right: 20px;
      width: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: none;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }
    #videoPreviewWrap.active { display: block; }
    #videoPreviewWrap .label {
      font-size: .72rem;
      color: var(--muted);
      padding: 6px 8px;
      border-bottom: 1px solid var(--border);
      background: #141827;
    }
    #videoPreview {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Controls bar */
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    #controls button {
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    #btnConnect {
      background: var(--accent);
      color: #fff;
    }
    #btnConnect:hover { background: var(--accent-hover); }
    #btnConnect.active { background: var(--danger); }
    #btnMic {
      background: var(--surface);
      border: 1px solid var(--border) !important;
      color: var(--text);
    }
    #btnMic.recording {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger) !important;
    }
    #btnVideo.active {
      background: var(--danger);
      color: #fff;
    }
    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border) !important;
      color: var(--text);
    }
    #textInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-size: .88rem;
      outline: none;
    }
    #textInput:focus { border-color: var(--accent); }
    #btnSend {
      background: var(--accent);
      color: #fff;
    }
    #btnSend:hover { background: var(--accent-hover); }
    #responseMode {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: .85rem;
      min-width: 130px;
      outline: none;
    }
    #responseMode:focus { border-color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>ADIOU – مساعد ثنائي اللغة</h1>
    <div id="status">
      <span class="dot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </header>

  <div id="videoPreviewWrap">
    <div class="label">Live video</div>
    <video id="videoPreview" autoplay muted playsinline></video>
  </div>

  <div id="chat"></div>

  <div id="controls">
    <button id="btnConnect">Connect</button>
    <button id="btnMic" disabled>🎤 Mic</button>
    <select id="responseMode" title="Assistant output mode">
      <option value="both">🔊 + 📝 Both</option>
      <option value="text">📝 Text only</option>
      <option value="audio">🔊 Audio only</option>
    </select>
    <button id="btnVideo" class="btn-secondary" disabled>📹 Live Video</button>
    <button id="btnImage" class="btn-secondary" disabled>🖼 Image</button>
    <button id="btnPdf" class="btn-secondary" disabled>📄 PDF</button>
    <input  id="textInput" type="text" placeholder="Type a message…" disabled>
    <button id="btnSend" disabled>Send</button>
    <input id="fileImage" type="file" accept="image/*" hidden>
    <input id="filePdf" type="file" accept="application/pdf" hidden>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
